<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Order System — Invoices</title>
    <link rel="stylesheet" href="i18n.css">
    <style>
        body { font-family: Arial, sans-serif; background: #fff; margin: 0; padding: 80px 20px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-block-end: 24px; }
        h2 { font-size: 20px; font-weight: 500; margin: 0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f9fafb; color: #666; font-weight: 500; text-align: start; padding: 12px; border-block-end: 1px solid #eee; }
        td { padding: 12px; border-block-end: 1px solid #eee; color: #333; }
        .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .paid { background: #e1f5ee; color: #065f46; }
    </style>
</head>
<body>
<div class="header">
    <h2 data-i18n="invoice_title">היסטוריית חשבוניות</h2>
</div>
<table>
    <thead>
        <tr>
            <th data-i18n="th_date">תאריך</th>
            <th data-i18n="th_order">מספר הזמנה</th>
            <th data-i18n="th_amount">סכום</th>
            <th data-i18n="th_status">סטטוס</th>
        </tr>
    </thead>
    <tbody>
        <tr><td>17/04/2026</td><td>#882</td><td>₪450.00</td><td><span class="status paid" data-i18n="stat_paid">שולם</span></td></tr>
        <tr><td>15/04/2026</td><td>#879</td><td>₪1,200.00</td><td><span class="status paid" data-i18n="stat_paid">שולם</span></td></tr>
        <tr><td>12/04/2026</td><td>#875</td><td>₪890.00</td><td><span class="status paid" data-i18n="stat_paid">שולם</span></td></tr>
    </tbody>
</table>
<script src="translations.js"></script>
</body>
</html>
